<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Compagnon — Voyage du 50ème</title>
    <link rel="stylesheet" href="style.css">

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
</head>

<body>

<header>
    Voyage du 50ème des Compagnons de la Douve
    <small>Connexion Compagnon</small>
</header>

<div class="container">
    <h2>Connexion Compagnon</h2>

    <div id="error" class="error" style="color:#b30000; font-weight:bold; margin-bottom:15px;"></div>

    <label>Email</label>
    <input type="email" id="email" placeholder="exemple@douve.ch">

    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="Douve1234">

    <label>Code d'accès du groupe</label>
    <input type="text" id="accessCode" placeholder="Douve1976">

    <a id="btnLogin" class="btn">Se connecter</a>

    <div class="buttons">
        <a href="index.html" class="btn">Retour</a>
    </div>
</div>

<footer>
    © Douane 50ème — Encaveurs & Tradition
</footer>

<script>

    /* 🔥 URL BACKEND POCKETBASE RENDER */
    const pb = new PocketBase("https://pocketbase-site.onrender.com");

    document.getElementById("btnLogin").onclick = async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const accessCode = document.getElementById("accessCode").value.trim();
        const errorBox = document.getElementById("error");

        errorBox.innerText = "";

        if (!email || !password || !accessCode) {
            errorBox.innerText = "Veuillez remplir tous les champs.";
            return;
        }

        try {
            // 1) Connexion du compagnon
            await pb.collection("companions").authWithPassword(email, password);
            const companion = pb.authStore.model;

            // 2) Vérification du groupe via le code d'accès
            const groups = await pb.collection("groups").getFullList({
                filter: `accessCode_ = "${accessCode}"`
            });

            if (groups.length === 0) {
                pb.authStore.clear();
                errorBox.innerText = "Code d'accès invalide.";
                return;
            }

            const group = groups[0];

            // 3) Vérifier que le compagnon appartient à ce groupe
            if (companion.group !== group.id) {
                pb.authStore.clear();
                errorBox.innerText = "Vous n'appartenez pas à ce groupe.";
                return;
            }

            // 4) Stocker les infos pour la page panier
            localStorage.setItem("groupId", group.id);
            localStorage.setItem("companionId", companion.id);
            localStorage.setItem("companionName", companion.name);

            // 5) Connexion réussie → redirection
            window.location.href = "compagnon-panier.html";

        } catch (err) {
            console.error(err);
            errorBox.innerText = "Email ou mot de passe incorrect.";
        }
    };
</script>

</body>
</html>
