<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter / Modifier une ligne</title>
    <link rel="stylesheet" href="style.css">

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* Champs stylés */
        .input-wrapper {
            width: 55%;
            margin: 0 auto 18px auto;
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b1f32;
            opacity: 0.8;
        }

        .input-styled {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: #fffdf8;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .input-styled:focus {
            border-color: #6b1f32;
            box-shadow: 0 0 6px rgba(107, 31, 50, 0.3);
            outline: none;
        }

        /* Select stylé */
        select.input-styled {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%236b1f32' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 18px;
        }

        /* Bloc d'information important */
        .important-box {
            background: #fff4e6;
            border-left: 5px solid #d17a00;
            padding: 14px;
            margin: 25px auto;
            width: 85%;
            border-radius: 8px;
            font-size: 15px;
            color: #6b1f32;
            line-height: 1.5;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }

        header {
            background: #6b1f32;
            color: white;
            padding: 25px 10px;
            text-align: center;
            border-bottom: 4px solid #c9a86a;
        }

        header small {
            display: block;
            font-size: 16px;
            opacity: 0.85;
        }
    </style>
</head>

<body>

<header>
    Voyage du 50ème des Compagnons de la Douve
    <small>Ajouter une ligne</small>
</header>

<div class="container">
    <h2 id="formTitle">Ajouter une ligne</h2>

    <!-- Cave -->
    <label for="product">Cave</label>
    <div class="input-wrapper">
        <i class="fa-solid fa-wine-bottle"></i>
        <input type="text" id="product" class="input-styled" placeholder="Nom de la cave">
    </div>

    <!-- Quantité -->
    <label for="quantity">Quantité</label>
    <div class="input-wrapper">
        <i class="fa-solid fa-hashtag"></i>
        <input type="number" id="quantity" class="input-styled" min="1" value="1">
    </div>

    <!-- Volume -->
    <label for="volume">Volume</label>
    <div class="input-wrapper">
        <i class="fa-solid fa-flask"></i>
        <select id="volume" class="input-styled">
            <option value="37.5cl">37.5 cl</option>
            <option value="50cl">50 cl</option>
            <option value="75cl" selected>75 cl</option>
            <option value="100cl">100 cl</option>
            <option value="150cl">150 cl</option>
        </select>
    </div>

    <!-- Prix -->
    <label for="price">Prix TOTAL en €</label>
    <div class="input-wrapper">
        <i class="fa-solid fa-euro-sign"></i>
        <input type="number" id="price" class="input-styled" min="0" step="0.05" value="0">
    </div>

    <!-- ⚠️ IMPORTANT — placé au bon endroit -->
    <div class="important-box">
        ⚠️ <strong>Important :</strong><br>
        Si le prix total de la commande d'une même cave a déjà été comptabilisé dans une autre ligne,<br>
        indiquez <strong>0</strong> dans le champ « Prix TOTAL en € ».
    </div>

    <div class="buttons">
        <button class="btn" onclick="saveLine(false)" id="btnAddMore">Ajouter une autre ligne</button>
        <button class="btn" onclick="saveLine(true)" id="btnFinish">Terminer et revenir au panier</button>
        <a id="btnBack" class="btn">Retour au panier</a>
    </div>
</div>

<footer>
    <p>© Douane 50ème — Encaveurs & Tradition</p>
</footer>

<script>

    const pb = new PocketBase("https://pocketbase-site.onrender.com");

    // Vérifie que le compagnon est connecté
    const companion = pb.authStore.model;
    if (!companion) {
        alert("Vous devez être connecté.");
        window.location.href = "compagnon-login.html";
    }

    // Récupère les paramètres URL
    const urlParams = new URLSearchParams(window.location.search);
    const panierId = urlParams.get("panier") || urlParams.get("basket");
    const editId = urlParams.get("edit");
    const cavePreRemplie = urlParams.get("cave");

    if (!panierId) {
        alert("Panier introuvable.");
        window.location.href = "compagnon-menu.html";
    }

    // Bouton retour
    document.getElementById("btnBack").href = "compagnon-panier.html?panier=" + panierId;

    // Pré-remplissage cave
    if (cavePreRemplie && !editId) {
        document.getElementById("product").value = cavePreRemplie;
    }

    // MODE MODIFIER
    if (editId) loadLineToEdit();

    async function loadLineToEdit() {
        try {
            const line = await pb.collection("lines").getOne(editId);

            document.getElementById("product").value = line.product;
            document.getElementById("quantity").value = line.quantity;
            document.getElementById("volume").value = line.volume;
            document.getElementById("price").value = line.price;

            document.getElementById("formTitle").innerText = "Modifier une ligne";
            document.getElementById("btnAddMore").style.display = "none";
            document.getElementById("btnFinish").innerText = "Enregistrer les modifications";

        } catch (err) {
            console.error(err);
            alert("Erreur lors du chargement de la ligne.");
        }
    }

    async function saveLine(terminer) {
        const product = document.getElementById("product").value.trim();
        const quantity = parseInt(document.getElementById("quantity").value);
        const volume = document.getElementById("volume").value;
        const price = parseFloat(document.getElementById("price").value);

        if (!product || quantity <= 0 || price < 0) {
            alert("Veuillez remplir correctement tous les champs.");
            return;
        }

        try {
            if (editId) {
                await pb.collection("lines").update(editId, {
                    product,
                    quantity,
                    volume,
                    price
                });

                window.location.href = "compagnon-panier.html?panier=" + panierId;
                return;
            }

            // MODE AJOUT
            await pb.collection("lines").create({
                basket: panierId,
                product,
                quantity,
                volume,
                price
            });

            if (terminer) {
                window.location.href = "compagnon-panier.html?panier=" + panierId;
            } else {
                window.location.href =
                    "compagnon-lignes.html?panier=" + panierId +
                    "&cave=" + encodeURIComponent(product);
            }

        } catch (err) {
            console.error("ERREUR POCKETBASE :", err);
            console.error("DETAILS :", err.data);
            alert("Erreur lors de l'enregistrement : " + JSON.stringify(err.data));
        }
    }
</script>

</body>
</html>
