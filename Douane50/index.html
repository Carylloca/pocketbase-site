<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil — Voyage du 50ème</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #faf7f5;
            margin: 0;
            padding: 0;
        }

        header {
            background: #6a0f25;
            color: white;
            padding: 30px 10px;
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        header small {
            display: block;
            font-size: 16px;
            margin-top: 5px;

        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #6a0f25;

        p {

            margin-bottom: 25px;
            color: #444;
        }

        .buttons {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            background: #6a0f25;
            color: white;
            padding: 12px 22px;
            border-radius: 10px;
            text-decoration: none;
            margin: 10px;
            font-size: 18px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #8c1433;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            color: #777;
            font-size: 14px;
        }
