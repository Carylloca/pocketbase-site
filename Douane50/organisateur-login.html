<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Organisateur — Voyage du 50ème</title>
    <link rel="stylesheet" href="style.css">

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        /* Champs moins larges */
        .input-small {
            width: 70%;
            margin: 0 auto 18px auto;
            display: block;
        }
    </style>
</head>

<body>

<header>
    Voyage du 50ème des Compagnons de la Douve
    <small>Connexion Organisateur</small>
</header>

<div class="container">
    <h2>Connexion Organisateur</h2>

    <div id="error" class="error" style="color:#b30000; font-weight:bold; margin-bottom:15px;"></div>

    <label>Email</label>
    <input type="email" id="email" class="input-small" placeholder="organisateur@douve.ch">

    <label>Mot de passe</label>
    <input type="password" id="password" class="input-small" placeholder="Votre mot de passe">

    <a id="btnLogin" class="btn">Connexion</a>

    <div class="buttons">
        <a href="index.html" class="btn">Retour</a>
    </div>
</div>

<footer>
    © Douane 50ème — Encaveurs & Tradition
</footer>

<script>

    /* 🔥 URL BACKEND POCKETBASE RENDER */
    const pb = new PocketBase("https://pocketbase-site.onrender.com");

    document.getElementById("btnLogin").onclick = async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorBox = document.getElementById("error");

        errorBox.innerText = "";

        if (!email || !password) {
            errorBox.innerText = "Veuillez remplir tous les champs.";
            return;
        }

        try {
            // Connexion organisateur
            await pb.collection("organizers").authWithPassword(email, password);

            // Redirection
            window.location.href = "organisateur-groupes.html";

        } catch (err) {
            console.error(err);
            errorBox.innerText = "Email ou mot de passe incorrect.";
        }
    };
</script>

</body>
</html>
