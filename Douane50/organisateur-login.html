<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Organisateur</title>
    <link rel="stylesheet" href="style.css">

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
</head>

<body>

<header>
    <h1>Douane 50ème</h1>
</header>

<div class="container">
    <h2>Connexion Organisateur</h2>

    <div id="error" class="error"></div>

    <label>Email</label>
    <input type="email" id="email">

    <label>Mot de passe</label>
    <input type="password" id="password">

    <a id="btnLogin" class="btn">Connexion</a>

    <div class="buttons">
        <a href="index.html" class="btn">Retour</a>
    </div>
</div>

<footer>
    <p>© Douane 50ème — Encaveurs & Tradition</p>
</footer>

<script>
    const pb = new PocketBase("http://127.0.0.1:8090");

    document.getElementById("btnLogin").onclick = async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorBox = document.getElementById("error");

        errorBox.innerText = "";

        if (!email || !password) {
            errorBox.innerText = "Veuillez remplir tous les champs.";
            return;
        }

        try {
            // Connexion organisateur
            await pb.collection("organizers").authWithPassword(email, password);

            // Redirection
            window.location.href = "organisateur-groupes.html";

        } catch (err) {
            console.error(err);
            errorBox.innerText = "Email ou mot de passe incorrect.";
        }
    };
</script>

</body>
</html>
