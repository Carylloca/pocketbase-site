<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau Panier — Voyage du 50ème</title>
    <link rel="stylesheet" href="style.css">

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        /* Champs moins larges */
        .input-small {
            width: 70%;
            margin: 0 auto 18px auto;
            display: block;
        }
    </style>
</head>

<body>

<header>
    Voyage du 50ème des Compagnons de la Douve
    <small>Créer un panier</small>
</header>

<div class="container">
    <h2>Créer un panier</h2>

    <label>Compagnon</label>
    <select id="companionSelect" class="input-small"></select>

    <a id="btnCreate" class="btn">Créer le panier</a>

    <div class="buttons">
        <a id="btnRetourPaniers" class="btn">Retour aux paniers</a>
        <a href="organisateur-groupes.html" class="btn">Retour au menu</a>
    </div>
</div>

<footer>
    © Douane 50ème — Encaveurs & Tradition
</footer>

<script>

    /* 🔥 URL BACKEND POCKETBASE RENDER */
    const pb = new PocketBase("https://pocketbase-site.onrender.com");

    // Récupère l'ID du groupe dans l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const groupId = urlParams.get("group");

    if (!groupId) {
        alert("Aucun groupe fourni.");
        window.location.href = "organisateur-groupes.html";
    }

    // Configure le bouton retour
    document.getElementById("btnRetourPaniers").href =
        "organisateur-liste.html?group=" + groupId;

    // Charge les compagnons du groupe
    async function loadCompanions() {
        try {
            const companions = await pb.collection("companions").getFullList({
                filter: `group = "${groupId}"`,
                sort: "name"
            });

            const select = document.getElementById("companionSelect");
            select.innerHTML = "";

            companions.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });

            if (companions.length === 0) {
                select.innerHTML = `<option>Aucun compagnon dans ce groupe</option>`;
            }

        } catch (err) {
            console.error(err);
            alert("Erreur lors du chargement des compagnons.");
        }
    }

    // Création du panier
    document.getElementById("btnCreate").onclick = async () => {
        const companionId = document.getElementById("companionSelect").value;

        if (!companionId) {
            alert("Veuillez sélectionner un compagnon.");
            return;
        }

        try {
            await pb.collection("baskets").create({
                group: groupId,
                companion: companionId
            });

            alert("Panier créé !");
            window.location.href = "organisateur-liste.html?group=" + groupId;

        } catch (err) {
            console.error(err);
            alert("Erreur lors de la création du panier.");
        }
    };

    loadCompanions();
</script>

</body>
</html>
