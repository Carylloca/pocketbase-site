<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paniers du groupe — Voyage du 50ème</title>
    <link rel="stylesheet" href="style.css">

    <!-- Librairies Export PDF & Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* Carte moderne pour chaque compagnon */
        .basket-card {
            background: #ffffff;
            border-left: 6px solid #6b1f32;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }

        .basket-title {
            font-size: 20px;
            font-weight: 600;
            color: #6b1f32;
            margin-bottom: 10px;
        }

        .basket-info {
            font-size: 15px;
            margin-bottom: 10px;
        }

        .basket-info span {
            font-weight: 600;
        }

        .total-card {
            background: #f5f0eb;
            border-left: 6px solid #c9a86a;
        }
    </style>
</head>

<body>

<header>
    Voyage du 50ème des Compagnons de la Douve
    <small>Paniers du groupe</small>
</header>

<div class="container">
    <h2 id="groupName">Chargement...</h2>

    <div class="buttons">
        <a class="btn" onclick="exportGroupPDF()">Export PDF</a>
        <a class="btn" onclick="exportGroupExcel()">Export Excel</a>
    </div>

    <div id="basketsList"></div>

    <div class="buttons">
        <a href="organisateur-groupes.html" class="btn">Retour</a>
    </div>
</div>

<footer>
    © Douane 50ème — Encaveurs & Tradition
</footer>

<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
<script>

    const pb = new PocketBase("https://pocketbase-site.onrender.com");

    const params = new URLSearchParams(window.location.search);
    let groupId = params.get("group");

    if (!groupId) groupId = localStorage.getItem("currentGroup");
    if (!groupId) {
        alert("Groupe introuvable.");
        window.location.href = "organisateur-groupes.html";
    }

    localStorage.setItem("currentGroup", groupId);

    /* ---------------------------------------------------
       🔥 CHARGEMENT DES PANIERS DU GROUPE
    --------------------------------------------------- */
    async function loadBaskets() {
        try {
            const group = await pb.collection("groups").getOne(groupId);
            document.getElementById("groupName").innerText =
                "Paniers du groupe : " + group.name;

            const baskets = await pb.collection("baskets").getFullList({
                filter: `group = "${groupId}"`,
                expand: "companion"
            });

            const list = document.getElementById("basketsList");

            if (baskets.length === 0) {
                list.innerHTML = "<p>Aucun panier pour ce groupe.</p>";
                return;
            }

            baskets.sort((a, b) => {
                const nameA = (a.expand?.companion?.name || "").toLowerCase();
                const nameB = (b.expand?.companion?.name || "").toLowerCase();
                return nameA.localeCompare(nameB);
            });

            let totalLitresGlobal = 0;
            let totalPrixGlobal = 0;

            for (const b of baskets) {

                const comp = b.expand?.companion;
                const name = comp ? comp.name : "Inconnu";

                const lines = await pb.collection("lines").getFullList({
                    filter: `basket = "${b.id}"`
                });

                let totalPrix = 0;
                let totalCl = 0;

                lines.forEach(line => {
                    totalPrix += line.price || 0;
                    const volCl = parseFloat(line.volume.replace("cl", "")) || 0;
                    totalCl += volCl * line.quantity;
                });

                const totalLitres = (totalCl / 100).toFixed(2);
                const totalPrixFix = totalPrix.toFixed(2);

                totalLitresGlobal += Number(totalLitres);
                totalPrixGlobal += Number(totalPrixFix);

                list.innerHTML += `
                    <div class="basket-card">
                        <div class="basket-title">${name}</div>
                        <div class="basket-info">
                            <span>Total litres :</span> ${totalLitres} L<br>
                            <span>Total prix :</span> ${totalPrixFix} €
                        </div>
                        <a class="btn" href="organisateur-panier.html?panier=${b.id}&group=${groupId}">
                            Voir le panier
                        </a>
                    </div>
                `;
            }

            list.innerHTML += `
                <div class="basket-card total-card">
                    <div class="basket-title">Total général du groupe</div>
                    <div class="basket-info">
                        <span>Total litres :</span> ${totalLitresGlobal.toFixed(2)} L<br>
                        <span>Total prix :</span> ${totalPrixGlobal.toFixed(2)} €
                    </div>
                </div>
            `;

        } catch (err) {
            console.error("ERREUR loadBaskets :", err);
            alert("Erreur lors du chargement des paniers (voir console).");
        }
    }

    loadBaskets();

    /* ---------------------------------------------------
       📄 EXPORT PDF — Totaux compagnon + total global groupe
    --------------------------------------------------- */
    async function exportGroupPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text("Liste paniers détaillés — Groupe", 10, 15);

        let y = 30;

        const baskets = await pb.collection("baskets").getFullList({
            filter: `group = "${groupId}"`,
            expand: "companion"
        });

        let totalGlobalPrix = 0;
        let totalGlobalCl = 0;

        const grouped = {};

        for (const b of baskets) {
            const name = b.expand?.companion?.name || "Inconnu";
            if (!grouped[name]) grouped[name] = [];
            grouped[name].push(b);
        }

        for (const name of Object.keys(grouped)) {

            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text(name, 10, y);
            y += 8;

            let totalCompagnon = 0;
            let totalCompCl = 0;

            for (const b of grouped[name]) {
                const lines = await pb.collection("lines").getFullList({
                    filter: `basket = "${b.id}"`
                });

                doc.setFontSize(11);
                doc.setFont("helvetica", "normal");

                lines.forEach(line => {
                    const price = line.price || 0;
                    const volCl = parseFloat(line.volume.replace("cl", "")) || 0;

                    totalCompagnon += price;
                    totalCompCl += volCl * line.quantity;

                    totalGlobalPrix += price;
                    totalGlobalCl += volCl * line.quantity;

                    doc.text(
                        `  ${line.product} — ${line.volume} — x${line.quantity} — ${price.toFixed(2)} €`,
                        14,
                        y
                    );
                    y += 7;
                });
            }

            const litresComp = (totalCompCl / 100).toFixed(2);

            doc.setFillColor(240, 220, 200);
            doc.rect(10, y - 2, 190, 8, "F");

            doc.setFont("helvetica", "bold");
            doc.text(`Total compagnon : ${totalCompagnon.toFixed(2)} € — ${litresComp} L`, 14, y + 4);

            y += 14;

            doc.setDrawColor(150, 0, 0);
            doc.line(10, y, 200, y);
            y += 10;
        }

        const litresGlobal = (totalGlobalCl / 100).toFixed(2);
        const totalGlobalText = `TOTAL GLOBAL GROUPE : ${totalGlobalPrix.toFixed(2)} € — ${litresGlobal} L`;

        doc.setFillColor(220, 200, 180);
        doc.rect(10, y, 190, 10, "F");

        doc.setFont("helvetica", "bold");
        doc.text(totalGlobalText, 14, y + 7);

        doc.save("liste-paniers-groupe.pdf");
    }

    /* ---------------------------------------------------
       📊 EXPORT EXCEL — Totaux compagnon + total global groupe
    --------------------------------------------------- */
    async function exportGroupExcel() {
        const baskets = await pb.collection("baskets").getFullList({
            filter: `group = "${groupId}"`,
            expand: "companion"
        });

        let rows = [];
        let totalRowsIndex = [];

        let totalGlobalPrix = 0;
        let totalGlobalCl = 0;

        for (const b of baskets) {
            const name = b.expand?.companion?.name || "Inconnu";

            const lines = await pb.collection("lines").getFullList({
                filter: `basket = "${b.id}"`
            });

            let totalPrix = 0;
            let totalCl = 0;

            lines.forEach(line => {
                const price = line.price || 0;
                const volCl = parseFloat(line.volume.replace("cl", "")) || 0;

                totalPrix += price;
                totalCl += volCl * line.quantity;

                totalGlobalPrix += price;
                totalGlobalCl += volCl * line.quantity;

                rows.push({
                    Compagnon: name,
                    Cave: line.product,
                    Volume: line.volume,
                    Quantité: line.quantity,
                    Prix: price
                });
            });

            totalRowsIndex.push(rows.length);
            rows.push({
                Compagnon: name,
                Cave: "TOTAL COMPAGNON",
                Volume: (totalCl / 100).toFixed(2) + " L",
                Quantité: "",
                Prix: totalPrix.toFixed(2)
            });
        }

        rows.push({
            Compagnon: "TOTAL GLOBAL GROUPE",
            Cave: "",
            Volume: (totalGlobalCl / 100).toFixed(2) + " L",
            Quantité: "",
            Prix: totalGlobalPrix.toFixed(2)
        });

        const worksheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();

        XLSX.utils.book_append_sheet(workbook, worksheet, "Groupe");

        XLSX.writeFile(workbook, "liste-paniers-groupe.xlsx");
    }

</script>

</body>
</html>
