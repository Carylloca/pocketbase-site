<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paniers du groupe</title>
    <link rel="stylesheet" href="style.css">

    <!-- Librairies Export PDF & Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            text-align: left;
        }
        th {
            background: #eee;
            font-weight: bold;
        }
        tfoot td {
            font-weight: bold;
            background: #f5f0eb;
            border-top: 2px solid #6a0f25;
        }
    </style>
</head>

<body>

<header>
    <h1>Douane 50ème</h1>
</header>

<div class="container">
    <h2 id="groupName">Chargement...</h2>

    <div class="buttons">
        <a class="btn" onclick="exportGroupPDF()">Export PDF</a>
        <a class="btn" onclick="exportGroupExcel()">Export Excel</a>
    </div>

    <div id="basketsList"></div>

    <div class="buttons">
        <a href="organisateur-groupes.html" class="btn">Retour</a>
    </div>
</div>

<footer>
    <p>© Douane 50ème — Encaveurs & Tradition</p>
</footer>

<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
<script>

    const pb = new PocketBase("https://pocketbase-site.onrender.com");

    const params = new URLSearchParams(window.location.search);
    let groupId = params.get("group");

    if (!groupId) groupId = localStorage.getItem("currentGroup");
    if (!groupId) {
        alert("Groupe introuvable.");
        window.location.href = "organisateur-groupes.html";
    }

    localStorage.setItem("currentGroup", groupId);

    async function loadBaskets() {
        try {
            const group = await pb.collection("groups").getOne(groupId);
            document.getElementById("groupName").innerText =
                "Paniers du groupe : " + group.name;

            const baskets = await pb.collection("baskets").getFullList({
                filter: `group = "${groupId}"`,
                expand: "companion"
            });

            const list = document.getElementById("basketsList");

            if (baskets.length === 0) {
                list.innerHTML = "<p>Aucun panier pour ce groupe.</p>";
                return;
            }

            baskets.sort((a, b) => {
                const nameA = (a.expand?.companion?.name || "").toLowerCase();
                const nameB = (b.expand?.companion?.name || "").toLowerCase();
                return nameA.localeCompare(nameB);
            });

            list.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Compagnon</th>
                            <th>Total litres</th>
                            <th>Total prix</th>
                            <th>Voir le panier</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                    <tfoot id="tfoot"></tfoot>
                </table>
            `;

            const tbody = document.getElementById("tbody");
            const tfoot = document.getElementById("tfoot");

            let totalLitresGlobal = 0;
            let totalPrixGlobal = 0;

            for (const b of baskets) {

                const comp = b.expand?.companion;
                const name = comp ? comp.name : "Inconnu";

                const lines = await pb.collection("lines").getFullList({
                    filter: `basket = "${b.id}"`
                });

                let totalPrix = 0;
                let totalCl = 0;

                lines.forEach(line => {
                    totalPrix += line.price || 0;
                    const volCl = parseFloat(line.volume.replace("cl", "")) || 0;
                    totalCl += volCl * line.quantity;
                });

                const totalLitres = (totalCl / 100).toFixed(2);
                const totalPrixFix = totalPrix.toFixed(2);

                totalLitresGlobal += Number(totalLitres);
                totalPrixGlobal += Number(totalPrixFix);

                tbody.innerHTML += `
                    <tr>
                        <td>${name}</td>
                        <td>${totalLitres} L</td>
                        <td>${totalPrixFix} €</td>
                        <td>
                            <a class="btn" href="organisateur-panier.html?panier=${b.id}">
                                Voir le panier
                            </a>
                        </td>
                    </tr>
                `;
            }

            tfoot.innerHTML = `
                <tr>
                    <td>Total général</td>
                    <td>${totalLitresGlobal.toFixed(2)} L</td>
                    <td>${totalPrixGlobal.toFixed(2)} €</td>
                    <td></td>
                </tr>
            `;

        } catch (err) {
            console.error("ERREUR loadBaskets :", err);
            alert("Erreur lors du chargement des paniers (voir console).");
        }
    }

    loadBaskets();

    /* ---------------------------------------------------
       📄 EXPORT PDF — regroupé par compagnon + séparateurs
    --------------------------------------------------- */
    async function exportGroupPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text("Liste paniers détaillés — Groupe", 10, 15);

        let y = 30;

        const baskets = await pb.collection("baskets").getFullList({
            filter: `group = "${groupId}"`,
            expand: "companion"
        });

        // Regroupement par compagnon
        const grouped = {};
        for (const b of baskets) {
            const name = b.expand?.companion?.name || "Inconnu";
            if (!grouped[name]) grouped[name] = [];
            grouped[name].push(b);
        }

        for (const name of Object.keys(grouped)) {

            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text(name, 10, y);
            y += 8;

            let totalCompagnon = 0;

            for (const b of grouped[name]) {
                const lines = await pb.collection("lines").getFullList({
                    filter: `basket = "${b.id}"`
                });

                doc.setFontSize(11);
                doc.setFont("helvetica", "normal");

                lines.forEach(line => {
                    totalCompagnon += line.price || 0;

                    doc.text(
                        `  ${line.product} — ${line.volume} — x${line.quantity} — ${line.price.toFixed(2)} €`,
                        14,
                        y
                    );
                    y += 7;
                });
            }

            // TOTAL COMPAGNON — gras + fond coloré
            doc.setFillColor(240, 220, 200);
            doc.rect(10, y - 2, 190, 8, "F");

            doc.setFont("helvetica", "bold");
            doc.text(`Total compagnon : ${totalCompagnon.toFixed(2)} €`, 14, y + 4);

            y += 14;

            // Séparateur
            doc.setDrawColor(150, 0, 0);
            doc.line(10, y, 200, y);
            y += 10;
        }

        doc.save("liste-paniers-detailles.pdf");
    }

    /* ---------------------------------------------------
       📊 EXPORT EXCEL — Totaux en gras + fond coloré
    --------------------------------------------------- */
    async function exportGroupExcel() {
        const baskets = await pb.collection("baskets").getFullList({
            filter: `group = "${groupId}"`,
            expand: "companion"
        });

        let rows = [];
        let totalRowsIndex = [];

        for (const b of baskets) {
            const name = b.expand?.companion?.name || "Inconnu";

            const lines = await pb.collection("lines").getFullList({
                filter: `basket = "${b.id}"`
            });

            let totalPrix = 0;

            lines.forEach(line => {
                totalPrix += line.price || 0;

                rows.push({
                    Compagnon: name,
                    Cave: line.product,
                    Volume: line.volume,
                    Quantité: line.quantity,
                    Prix: line.price
                });
            });

            totalRowsIndex.push(rows.length);
            rows.push({
                Compagnon: name,
                Cave: "TOTAL",
                Volume: "",
                Quantité: "",
                Prix: totalPrix.toFixed(2)
            });
        }

        const worksheet = XLSX.utils.json_to_sheet(rows);

        // Styles pour les totaux
        totalRowsIndex.forEach(idx => {
            const excelRow = idx + 2;

            ["A","B","C","D","E"].forEach(col => {
                worksheet[`${col}${excelRow}`].s = {
                    font: { bold: true },
                    fill: { fgColor: { rgb: "FFE5CC" } },
                    alignment: { indent: 1 }
                };
            });
        });

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Groupe");

        XLSX.writeFile(workbook, "liste-paniers-detailles.xlsx");
    }

</script>

</body>
</html>
